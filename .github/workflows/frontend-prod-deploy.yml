name: CD – Frontend Prod Deploy

# Auto-deploy to prod on pushes to main that touch the frontend.
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-prod-deploy.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push Frontend Prod Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Determine short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build & push
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api-prod.karma-grp.com
          tags: |
            ghcr.io/albardn2/karma-frontend:latest-prod
            ghcr.io/albardn2/karma-frontend:${{ env.SHORT_SHA }}-prod

  deploy:
    name: Deploy frontend prod stack
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy compose + Caddyfile to prod server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.FRONTEND_PROD_DROPLET_HOST }}
          username: root
          password: ${{ secrets.FRONTEND_PROD_DROPLET_PASSWORD }}
          port: 22
          source: |
            ./frontend/docker-compose.prod.yaml
            ./frontend/Caddyfile
          target: /root/app

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_PROD_DROPLET_HOST }}
          username: root
          password: ${{ secrets.FRONTEND_PROD_DROPLET_PASSWORD }}
          port: 22
          script: |
            cd /root/app/frontend
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans
