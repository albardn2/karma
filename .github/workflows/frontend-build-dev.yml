name: CI – Build Frontend Dev Image

permissions:
  contents: read
  packages: write

on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build-dev.yml'

jobs:
  build:
    name: Build & Push frontend dev image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Determine short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build & push images
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api-dev.karma-grp.com
          tags: |
            ghcr.io/albardn2/karma-frontend:latest-dev
            ghcr.io/albardn2/karma-frontend:${{ env.SHORT_SHA }}-dev
