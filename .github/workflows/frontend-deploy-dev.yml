name: CD – Deploy Frontend Dev

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Free disk on server (before any file copies)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_DEV_DROPLET_HOST }}
          username: root
          password: ${{ secrets.FRONTEND_DEV_DROPLET_PASSWORD }}
          port: 22
          script: |
            docker image prune -af || true
            docker builder prune -af || true
            docker container prune -f || true
            journalctl --vacuum-size=100M || true
            df -h /

      - name: Copy compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_DEV_DROPLET_HOST }}
          username: root
          password: ${{ secrets.FRONTEND_DEV_DROPLET_PASSWORD }}
          port: 22
          source: ./frontend/docker-compose.dev.yaml
          target: /root/app

      - name: Copy Caddyfile to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_DEV_DROPLET_HOST }}
          username: root
          password: ${{ secrets.FRONTEND_DEV_DROPLET_PASSWORD }}
          port: 22
          source: ./frontend/Caddyfile
          target: /root/app

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_DEV_DROPLET_HOST }}
          username: root
          password: ${{ secrets.FRONTEND_DEV_DROPLET_PASSWORD }}
          port: 22
          script: |
            cd /root/app/frontend
            # Auth to GHCR + reclaim disk before pulling the private image.
            # Without this, expired creds or a full disk make `pull` silently
            # no-op and stale code keeps running despite a "successful" deploy.
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker image prune -af
            docker builder prune -af
            docker compose -f docker-compose.dev.yaml pull
            docker compose -f docker-compose.dev.yaml up -d --remove-orphans
